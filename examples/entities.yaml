---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-system
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: examples
spec:
  owner: guests
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: public-alb
  title: Public ALB
spec:
  type: load-balancer
  owner: guests
  system: examples
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: public-hosted-zone
  title: Public Hosted Zone
spec:
  type: dns
  owner: guests
  system: examples
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: edge-waf
  title: Edge WAF
spec:
  type: waf
  owner: guests
  system: examples
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: envoy-on-ecs
  title: Envoy on ECS
spec:
  type: compute
  owner: guests
  system: examples
---
apiVersion: kabang.cloud/v1
kind: EdgeStack
metadata:
  name: shared-public-web-entry
  title: Shared Public Web Entry
  description: Shared public ALB to Envoy on ECS edge stack for internal API traffic.
spec:
  owner: guests
  team: guests
  pattern: public-web-entry
  shared: true
  projects:
    - guest-portal
    - guest-ops-console
  exposure:
    ingress: public
    upstream: private
  network:
    ingressSubnet: public
    upstreamSubnet: private
    region: ap-northeast-2
    environment: production
  routing:
    mode: host-path
    protocol: http
    tlsTerminationAt: alb
  attachments:
    - role: dns
      kind: route53
      entityRef: resource:default/public-hosted-zone
    - role: shield
      kind: waf
      entityRef: resource:default/edge-waf
  hops:
    - role: ingress
      kind: alb
      entityRef: resource:default/public-alb
    - role: proxy
      kind: envoy-on-ecs
      entityRef: resource:default/envoy-on-ecs
  targets:
    - entityRef: component:default/guest-portal-api
      trafficType: http
    - entityRef: component:default/guest-ops-console-api
      trafficType: http
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-component
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-website
spec:
  type: website
  lifecycle: experimental
  owner: guests
  system: examples
  providesApis: [example-grpc-api]
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: guest-portal-web
  title: Guest Portal Web
  description: Frontend for the guest portal project.
  annotations:
    kabang.cloud/project: guest-portal
spec:
  type: website
  lifecycle: production
  owner: guests
  system: examples
  dependsOn: [component:default/guest-portal-api]
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: guest-portal-api
  title: Guest Portal API
  description: Backend API for the guest portal project.
  annotations:
    kabang.cloud/project: guest-portal
spec:
  type: service
  lifecycle: production
  owner: guests
  system: examples
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: guest-ops-console-ui
  title: Guest Ops Console UI
  description: Operator-facing UI for the guest ops console project.
  annotations:
    kabang.cloud/project: guest-ops-console
spec:
  type: website
  lifecycle: production
  owner: guests
  system: examples
  dependsOn: [component:default/guest-ops-console-api]
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: guest-ops-console-api
  title: Guest Ops Console API
  description: Backend API for the guest ops console project.
  annotations:
    kabang.cloud/project: guest-ops-console
spec:
  type: service
  lifecycle: production
  owner: guests
  system: examples
  dependsOn: [component:default/guest-portal-api]
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-api
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: example-grpc-api
spec:
  type: grpc
  lifecycle: experimental
  owner: guests
  system: examples
  definition: |
    syntax = "proto3";

    service Exampler {
      rpc Example (ExampleMessage) returns (ExampleMessage) {};
    }

    message ExampleMessage {
      string example = 1;
    };
