apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: inhouse-cmdb-template
  title: Inhouse CMDB Intake
  description: Collect append-only inhouse-cmdb metadata with required project identity fields.
spec:
  owner: user:guest
  type: documentation
  parameters:
    - title: Required Metadata
      required:
        - projectCode
        - projectName
        - projectDescription
      properties:
        projectCode:
          title: Project Code
          type: string
          description: Stable project identifier used as the logical partition key.
          ui:autofocus: true
        projectName:
          title: Project Name
          type: string
          description: Human-readable project title shown in the catalog.
        projectDescription:
          title: Project Description
          type: string
          description: Current description snapshot for the project.
          ui:widget: textarea
          ui:options:
            rows: 4
  steps:
    - id: append
      name: Append inhouse-cmdb metadata
      action: inhouse-cmdb:append
      input:
        projectCode: ${{ parameters.projectCode }}
        projectName: ${{ parameters.projectName }}
        projectDescription: ${{ parameters.projectDescription }}
  output:
    links:
      - title: View Latest Metadata
        url: ${{ '/api/inhouse-cmdb/projects/' + parameters.projectCode + '/latest' }}
